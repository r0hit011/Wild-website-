<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rin™ Music Bot</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; color: white; overflow-x: hidden; }
        #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #0f0f1a; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .hero { text-align: center; background: rgba(0, 0, 0, 0.3); padding: 50px; border-radius: 25px; backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .bot-avatar { width: 160px; height: 160px; border-radius: 50%; border: 5px solid #6c5ce7; margin-bottom: 20px; box-shadow: 0 0 20px rgba(108, 92, 231, 0.5); }
        h1 { font-size: 3.5rem; margin: 10px 0; color: #a29bfe; }
        p { font-size: 1.3rem; max-width: 650px; margin-bottom: 30px; line-height: 1.6; }
        .btn { display: block; width: 320px; padding: 18px; margin: 12px 0; border-radius: 12px; text-decoration: none; font-weight: bold; transition: 0.4s; font-size: 1.1rem; }
        .btn-primary { background: #6c5ce7; color: white; }
        .btn-primary:hover { background: #5a4ad1; transform: scale(1.05); }
        .btn-secondary { background: rgba(255, 255, 255, 0.1); color: white; }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.05); }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="container">
        <div class="hero">
            <img src="https://via.placeholder.com/160" alt="Wild Bot" class="bot-avatar">
            <h1>Rin™</h1>
            <p>Wild is the best high-quality music bot for Discord. Experience crystal clear, lag-free audio streaming 24/7 in your server.</p>
            <a href="YOUR_INVITE_LINK" class="btn btn-primary">Add Wild™ to Discord</a>
            <a href="YOUR_SUPPORT_SERVER_LINK" class="btn btn-secondary">Join Support Server</a>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const particles = [];
        for(let i=0; i<80; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: Math.random()-0.5, vy: Math.random()-0.5 });
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = '#6c5ce7';
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0 || p.x>canvas.width) p.vx*=-1;
                if(p.y<0 || p.y>canvas.height) p.vy*=-1;
                ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
