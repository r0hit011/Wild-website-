<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; }
    </style>
</head>
<body>

    <!-- Hero Section -->
    <header class="text-center py-24">
        <h1 class="text-6xl font-extrabold mb-6">Meet Rin</h1>
        <p class="text-xl text-gray-400 mb-8">The most secure Discord protection bot.</p>
        <a href="#" class="bg-blue-600 px-10 py-4 rounded-full font-bold hover:bg-blue-700 transition">Invite Rin</a>
    </header>

    <!-- Features Section -->
    <section class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6 px-4 pb-20">
        <div class="bg-gray-900 p-8 rounded-2xl border border-gray-800">
            <h3 class="text-xl font-bold mb-2">Anti-Nuke</h3>
            <p class="text-gray-400">Stop server raids instantly.</p>
        </div>
        <div class="bg-gray-900 p-8 rounded-2xl border border-gray-800">
            <h3 class="text-xl font-bold mb-2">Auto-Mod</h3>
            <p class="text-gray-400">Filter spam and toxic content.</p>
        </div>
        <div class="bg-gray-900 p-8 rounded-2xl border border-gray-800">
            <h3 class="text-xl font-bold mb-2">Logging</h3>
            <p class="text-gray-400">Track every server activity.</p>
        </div>
    </section>

</body>
</html>
