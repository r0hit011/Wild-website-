<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #000; color: white; min-height: 100vh; overflow-x: hidden; }
        
        /* Star Flow Animation */
        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black url('https://www.transparenttextures.com/patterns/stardust.png');
            animation: flow 20s linear infinite; z-index: -1;
        }
        @keyframes flow { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }
    </style>
</head>
<body>

    <div class="stars"></div>

    <nav class="p-6 flex justify-between items-center">
        <div class="text-2xl font-bold tracking-tighter">RIN</div>
        <button id="menu-btn" class="text-3xl">☰</button>
    </nav>

    <div id="menu" class="hidden flex flex-col items-center p-4 bg-white/10 backdrop-blur-md">
        <a href="#" class="py-2">Features</a>
        <a href="#" class="py-2">Support</a>
    </div>

    <header class="text-center py-20 px-4">
        <h1 class="text-6xl font-extrabold mb-6">Meet Rin</h1>
        <p class="text-xl text-gray-400 mb-8">Ultimate music experience.</p>
        <a href="#" class="bg-indigo-600 px-10 py-4 rounded-full font-bold hover:bg-indigo-500 transition">Invite Rin</a>
    </header>

    <script>
        // Menu Toggle Logic
        document.getElementById('menu-btn').onclick = () => {
            document.getElementById('menu').classList.toggle('hidden');
        }
    </script>
</body>
</html>
